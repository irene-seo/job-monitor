name: 채용공고 모니터링

on:
  schedule:
    # 매일 오전 10시~오후 6시 KST (= UTC 01:00~09:00) 매시간 실행
    - cron: '0 1-9 * * *'
  workflow_dispatch:  # 수동 테스트용

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: 모니터링 실행
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/monitor.py

      - name: seen_jobs.json 커밋
        run: |
          git config user.name "Job Monitor Bot"
          git config user.email "bot@github-actions.com"
          git add data/seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
